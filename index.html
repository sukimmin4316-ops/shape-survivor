<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini Survivors</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial, sans-serif;
}
canvas {
    display: block;
    background: #111;
}
</style>
</head>

<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameStarted = false;

let player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 18,
    speed: 3,
    hp: 100,
    maxHp: 100,
    level: 1,
    exp: 0,
    maxExp: 5,
    attackDamage: 1
};

let skills = {
    multiShot: 0,
    shield: 0,
    shockwave: 0
};

let enemies = [];
let bullets = [];
let expOrbs = [];
let healOrbs = [];

let keys = {};
let score = 0;
let gameOver = false;
let levelUpChoosing = false;
let skillChoosing = false;

let enemySpawnTimer = 0;
let enemySpawnInterval = 90;

let shootTimer = 0;
let shootInterval = 70;

let healOrbTimer = 0;
let healOrbInterval = 1200;

let shieldAngle = 0;
let shockwaveTimer = 0;
let shockwaveInterval = 180;
let shockwaveEffectTimer = 0;

document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();
    keys[key] = true;

    if (gameOver && key === "r") restartGame();

    if (levelUpChoosing) {
        if (key === "1") chooseUpgrade("attackSpeed");
        if (key === "2") chooseUpgrade("hp");
        if (key === "3") chooseUpgrade("damage");
    }

    if (skillChoosing) {
        if (key === "1") chooseSkill("multiShot");
        if (key === "2") chooseSkill("shield");
        if (key === "3") chooseSkill("shockwave");
    }
});

document.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("click", (e) => {
    if (!gameStarted) {
        let buttonX = canvas.width / 2 - 120;
        let buttonY = canvas.height / 2 - 35;
        let buttonW = 240;
        let buttonH = 70;

        let mouseX = e.clientX;
        let mouseY = e.clientY;

        if (
            mouseX >= buttonX &&
            mouseX <= buttonX + buttonW &&
            mouseY >= buttonY &&
            mouseY <= buttonY + buttonH
        ) {
            gameStarted = true;
        }
    }
});

function movePlayer() {
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    if (player.x < player.radius) player.x = player.radius;
    if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
    if (player.y < player.radius) player.y = player.radius;
    if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;
}

function getEnemyStats() {
    return {
        radius: 16 + Math.floor(player.level / 12),
        speed: 1.1 + player.level * 0.015,
        hp: 2 + Math.floor(player.level / 6),
        damage: 0.35 + player.level * 0.01
    };
}

function getSpawnCount() {
    return 1 + Math.floor(player.level / 5);
}

function spawnEnemy() {
    let side = Math.floor(Math.random() * 4);
    let x, y;

    if (side === 0) {
        x = Math.random() * canvas.width;
        y = -30;
    } else if (side === 1) {
        x = canvas.width + 30;
        y = Math.random() * canvas.height;
    } else if (side === 2) {
        x = Math.random() * canvas.width;
        y = canvas.height + 30;
    } else {
        x = -30;
        y = Math.random() * canvas.height;
    }

    let stats = getEnemyStats();
    let isElite = Math.random() < 0.08;

    enemies.push({
        x: x,
        y: y,
        radius: isElite ? stats.radius * 2 : stats.radius,
        speed: isElite ? stats.speed * 0.75 : stats.speed,
        hp: isElite ? stats.hp * 5 : stats.hp,
        damage: isElite ? stats.damage * 1.5 : stats.damage,
        elite: isElite
    });
}

function spawnEnemyWave() {
    let count = getSpawnCount();

    for (let i = 0; i < count; i++) {
        spawnEnemy();
    }
}

function moveEnemies() {
    for (let enemy of enemies) {
        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 0) {
            enemy.x += (dx / distance) * enemy.speed;
            enemy.y += (dy / distance) * enemy.speed;
        }
    }
}

function autoShoot() {
    if (enemies.length === 0) return;

    let nearestEnemy = enemies[0];
    let nearestDistance = Infinity;

    for (let enemy of enemies) {
        let dx = enemy.x - player.x;
        let dy = enemy.y - player.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < nearestDistance) {
            nearestDistance = distance;
            nearestEnemy = enemy;
        }
    }

    let dx = nearestEnemy.x - player.x;
    let dy = nearestEnemy.y - player.y;
    let distance = Math.sqrt(dx * dx + dy * dy);
    if (distance === 0) return;

    let baseAngle = Math.atan2(dy, dx);

    // 멀티샷: 찍자마자 탄 수 증가, 최대 5발
    let bulletCount = 1 + skills.multiShot;
    if (bulletCount > 5) bulletCount = 5;

    let spread = 0.22;

    for (let i = 0; i < bulletCount; i++) {
        let angleOffset = (i - (bulletCount - 1) / 2) * spread;
        let angle = baseAngle + angleOffset;

        bullets.push({
            x: player.x,
            y: player.y,
            radius: 6 + Math.floor(skills.multiShot / 4),
            speed: 7,
            damage: player.attackDamage + skills.multiShot * 0.4,
            dx: Math.cos(angle),
            dy: Math.sin(angle)
        });
    }
}

function moveBullets() {
    for (let bullet of bullets) {
        bullet.x += bullet.dx * bullet.speed;
        bullet.y += bullet.dy * bullet.speed;
    }

    bullets = bullets.filter(bullet =>
        bullet.x > -50 &&
        bullet.x < canvas.width + 50 &&
        bullet.y > -50 &&
        bullet.y < canvas.height + 50
    );
}

function spawnExpOrb(x, y) {
    expOrbs.push({
        x: x,
        y: y,
        radius: 7,
        value: 1
    });
}

function collectExp() {
    for (let orb of expOrbs) {
        let dx = player.x - orb.x;
        let dy = player.y - orb.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < 150) {
            orb.x += dx * 0.08;
            orb.y += dy * 0.08;
        }

        if (distance < player.radius + orb.radius) {
            player.exp += orb.value;
            orb.collected = true;

            if (player.exp >= player.maxExp) {
                levelUp();
            }
        }
    }

    expOrbs = expOrbs.filter(orb => !orb.collected);
}

function levelUp() {
    player.level += 1;
    player.exp = 0;
    player.maxExp += 3;

    if (player.level % 3 === 0) {
        skillChoosing = true;
    } else {
        levelUpChoosing = true;
    }
}

function chooseUpgrade(type) {
    if (type === "attackSpeed") {
        if (shootInterval > 25) shootInterval -= 8;
    }

    if (type === "hp") {
        player.maxHp += 20;
        player.hp += 20;
        if (player.hp > player.maxHp) player.hp = player.maxHp;
    }

    if (type === "damage") {
        player.attackDamage += 1;
    }

    levelUpChoosing = false;
}

function chooseSkill(type) {
    if (skills[type] < 15) {
        skills[type] += 1;
    }

    skillChoosing = false;
}

function spawnHealOrb() {
    healOrbs.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: 11,
        heal: 40
    });
}

function collectHealOrb() {
    for (let orb of healOrbs) {
        let dx = player.x - orb.x;
        let dy = player.y - orb.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < player.radius + orb.radius) {
            player.hp += orb.heal;
            if (player.hp > player.maxHp) player.hp = player.maxHp;
            orb.collected = true;
        }
    }

    healOrbs = healOrbs.filter(orb => !orb.collected);
}

function updateShield() {
    if (skills.shield <= 0) return;

    shieldAngle += 0.04 + skills.shield * 0.002;

    let shieldCount = 1 + Math.floor(skills.shield / 5);
    let shieldRadius = 55 + skills.shield * 2;

    // 보호막 데미지: 레벨 1마다 확실히 증가
    let shieldDamage = 0.25 + skills.shield * 0.08;

    for (let i = 0; i < shieldCount; i++) {
        let angle = shieldAngle + (Math.PI * 2 / shieldCount) * i;
        let sx = player.x + Math.cos(angle) * shieldRadius;
        let sy = player.y + Math.sin(angle) * shieldRadius;

        for (let enemy of enemies) {
            let dx = sx - enemy.x;
            let dy = sy - enemy.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < 12 + enemy.radius) {
                enemy.hp -= shieldDamage;

                if (enemy.hp <= 0) {
                    enemy.dead = true;
                    score += enemy.elite ? 50 : 10;
                    spawnExpOrb(enemy.x, enemy.y);
                }
            }
        }
    }
}

function updateShockwave() {
    if (skills.shockwave <= 0) return;

    shockwaveTimer++;

    let cooldown = shockwaveInterval - skills.shockwave * 5;
    if (cooldown < 60) cooldown = 60;

    if (shockwaveTimer >= cooldown) {
        shockwaveTimer = 0;
        shockwaveEffectTimer = 18;

        // 충격파: 레벨마다 크기와 데미지 둘 다 증가
        let range = 100 + skills.shockwave * 14;
        let damage = 1.5 + skills.shockwave * 0.45;

        for (let enemy of enemies) {
            let dx = player.x - enemy.x;
            let dy = player.y - enemy.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < range) {
                enemy.hp -= damage;

                if (enemy.hp <= 0) {
                    enemy.dead = true;
                    score += enemy.elite ? 50 : 10;
                    spawnExpOrb(enemy.x, enemy.y);
                }
            }
        }
    }

    if (shockwaveEffectTimer > 0) shockwaveEffectTimer--;
}

function checkCollisions() {
    for (let enemy of enemies) {
        let dx = player.x - enemy.x;
        let dy = player.y - enemy.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < player.radius + enemy.radius) {
            player.hp -= enemy.damage;
        }
    }

    for (let bullet of bullets) {
        for (let enemy of enemies) {
            let dx = bullet.x - enemy.x;
            let dy = bullet.y - enemy.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < bullet.radius + enemy.radius) {
                enemy.hp -= bullet.damage;
                bullet.dead = true;

                if (enemy.hp <= 0) {
                    enemy.dead = true;
                    score += enemy.elite ? 50 : 10;
                    spawnExpOrb(enemy.x, enemy.y);
                }
            }
        }
    }

    bullets = bullets.filter(bullet => !bullet.dead);
    enemies = enemies.filter(enemy => !enemy.dead);

    if (player.hp <= 0) {
        player.hp = 0;
        gameOver = true;
    }
}

function drawCircle(x, y, radius, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
}

function drawMainMenu() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";

    ctx.fillStyle = "white";
    ctx.font = "bold 56px Arial";
    ctx.fillText("Circle Survivor", canvas.width / 2, canvas.height / 2 - 170);

    ctx.font = "20px Arial";
    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.fillText("끝없이 몰려오는 적을 물리치고 살아남으세요", canvas.width / 2, canvas.height / 2 - 125);

    let buttonX = canvas.width / 2 - 120;
    let buttonY = canvas.height / 2 - 35;
    let buttonW = 240;
    let buttonH = 70;

    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fillRect(buttonX, buttonY, buttonW, buttonH);

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(buttonX, buttonY, buttonW, buttonH);

    ctx.fillStyle = "white";
    ctx.font = "bold 28px Arial";
    ctx.fillText("시작하기", canvas.width / 2, canvas.height / 2 + 10);

    ctx.font = "18px Arial";
    ctx.fillStyle = "rgba(255,255,255,0.65)";
    ctx.fillText("2026 Web Design Final Project", canvas.width / 2, canvas.height / 2 + 135);
    ctx.fillText("김민수", canvas.width / 2, canvas.height / 2 + 165);

    ctx.textAlign = "right";
    ctx.font = "20px Arial";
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fillText("조작법: w a s d", canvas.width - 30, canvas.height - 30);

    ctx.textAlign = "left";
}

function drawUI() {
    ctx.fillStyle = "rgba(20,20,20,0.75)";
    ctx.fillRect(16, 16, 270, 360);

    ctx.strokeStyle = "rgba(255,255,255,0.35)";
    ctx.lineWidth = 2;
    ctx.strokeRect(16, 16, 270, 360);

    ctx.fillStyle = "white";
    ctx.font = "bold 22px Arial";
    ctx.fillText("STATUS", 32, 48);

    ctx.font = "18px Arial";
    ctx.fillText("Score  " + score, 32, 82);
    ctx.fillText("Level  " + player.level, 32, 112);
    ctx.fillText("Damage " + player.attackDamage, 32, 142);
    ctx.fillText("Enemies +" + getSpawnCount() + " / wave", 32, 172);

    ctx.fillText("HP " + Math.floor(player.hp) + " / " + player.maxHp, 32, 204);

    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillRect(32, 214, 210, 14);

    ctx.fillStyle = "lime";
    ctx.fillRect(32, 214, 210 * (player.hp / player.maxHp), 14);

    ctx.fillStyle = "white";
    ctx.fillText("EXP " + player.exp + " / " + player.maxExp, 32, 258);

    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillRect(32, 268, 210, 14);

    ctx.fillStyle = "cyan";
    ctx.fillRect(32, 268, 210 * (player.exp / player.maxExp), 14);

    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText("MultiShot Lv." + skills.multiShot + " / 15", 32, 310);
    ctx.fillText("Shield Lv." + skills.shield + " / 15", 32, 332);
    ctx.fillText("Shockwave Lv." + skills.shockwave + " / 15", 32, 354);
}

function drawUpgradeCard(x, y, w, h, key, title, desc) {
    ctx.fillStyle = "rgba(25,25,25,0.95)";
    ctx.fillRect(x, y, w, h);

    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.beginPath();
    ctx.arc(x + w / 2, y + 45, 24, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "white";
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "center";
    ctx.fillText(key, x + w / 2, y + 53);

    ctx.font = "bold 22px Arial";
    ctx.fillText(title, x + w / 2, y + 100);

    ctx.font = "18px Arial";
    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.fillText(desc, x + w / 2, y + 135);

    ctx.textAlign = "left";
}

function drawLevelUpMenu() {
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";
    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.fillText("LEVEL UP", canvas.width / 2, canvas.height / 2 - 170);

    drawUpgradeCard(canvas.width / 2 - 390, canvas.height / 2 - 80, 240, 180, "1", "Attack Speed", "Fire faster");
    drawUpgradeCard(canvas.width / 2 - 120, canvas.height / 2 - 80, 240, 180, "2", "Max HP", "+20 Max HP");
    drawUpgradeCard(canvas.width / 2 + 150, canvas.height / 2 - 80, 240, 180, "3", "Damage", "+1 Damage");

    ctx.font = "18px Arial";
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fillText("Press 1 / 2 / 3", canvas.width / 2, canvas.height / 2 + 150);

    ctx.textAlign = "left";
}

function drawSkillMenu() {
    ctx.fillStyle = "rgba(0,0,0,0.78)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";
    ctx.fillStyle = "white";
    ctx.font = "bold 42px Arial";
    ctx.fillText("SKILL SELECT", canvas.width / 2, canvas.height / 2 - 170);

    drawUpgradeCard(canvas.width / 2 - 390, canvas.height / 2 - 80, 240, 180, "1", "Multi Shot", "Lv." + skills.multiShot + " / 15");
    drawUpgradeCard(canvas.width / 2 - 120, canvas.height / 2 - 80, 240, 180, "2", "Orbit Shield", "Lv." + skills.shield + " / 15");
    drawUpgradeCard(canvas.width / 2 + 150, canvas.height / 2 - 80, 240, 180, "3", "Shockwave", "Lv." + skills.shockwave + " / 15");

    ctx.font = "18px Arial";
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.fillText("Every 3 levels, choose one skill", canvas.width / 2, canvas.height / 2 + 150);

    ctx.textAlign = "left";
}

function drawShield() {
    if (skills.shield <= 0) return;

    let shieldCount = 1 + Math.floor(skills.shield / 5);
    let shieldRadius = 55 + skills.shield * 2;

    for (let i = 0; i < shieldCount; i++) {
        let angle = shieldAngle + (Math.PI * 2 / shieldCount) * i;
        let sx = player.x + Math.cos(angle) * shieldRadius;
        let sy = player.y + Math.sin(angle) * shieldRadius;

        drawCircle(sx, sy, 12, "violet");
    }
}

function drawShockwaveEffect() {
    if (shockwaveEffectTimer <= 0) return;

    let range = 100 + skills.shockwave * 14;
    let alpha = shockwaveEffectTimer / 18;

    ctx.strokeStyle = "rgba(255,255,255," + alpha + ")";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(player.x, player.y, range, 0, Math.PI * 2);
    ctx.stroke();
}

function drawGameOver() {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "48px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);

    ctx.font = "24px Arial";
    ctx.fillText("Score: " + score, canvas.width / 2, canvas.height / 2 + 5);
    ctx.fillText("Level: " + player.level, canvas.width / 2, canvas.height / 2 + 40);
    ctx.fillText("Press R to Restart", canvas.width / 2, canvas.height / 2 + 80);

    ctx.textAlign = "left";
}

function update() {
    if (!gameStarted) return;
    if (gameOver) return;
    if (levelUpChoosing || skillChoosing) return;

    movePlayer();

    enemySpawnTimer++;
    if (enemySpawnTimer >= enemySpawnInterval) {
        spawnEnemyWave();
        enemySpawnTimer = 0;

        if (enemySpawnInterval > 35) {
            enemySpawnInterval -= 0.2;
        }
    }

    shootTimer++;
    if (shootTimer >= shootInterval) {
        autoShoot();
        shootTimer = 0;
    }

    healOrbTimer++;
    if (healOrbTimer >= healOrbInterval) {
        spawnHealOrb();
        healOrbTimer = 0;
    }

    moveEnemies();
    moveBullets();

    updateShield();
    updateShockwave();

    checkCollisions();
    collectExp();
    collectHealOrb();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameStarted) {
        drawMainMenu();
        return;
    }

    drawShockwaveEffect();

    drawCircle(player.x, player.y, player.radius, "deepskyblue");
    drawShield();

    for (let enemy of enemies) {
        drawCircle(enemy.x, enemy.y, enemy.radius, enemy.elite ? "orange" : "crimson");
    }

    for (let bullet of bullets) drawCircle(bullet.x, bullet.y, bullet.radius, "yellow");
    for (let orb of expOrbs) drawCircle(orb.x, orb.y, orb.radius, "cyan");
    for (let orb of healOrbs) drawCircle(orb.x, orb.y, orb.radius, "lime");

    drawUI();

    if (levelUpChoosing) drawLevelUpMenu();
    if (skillChoosing) drawSkillMenu();
    if (gameOver) drawGameOver();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function restartGame() {
    player.x = canvas.width / 2;
    player.y = canvas.height / 2;
    player.hp = 100;
    player.maxHp = 100;
    player.level = 1;
    player.exp = 0;
    player.maxExp = 5;
    player.attackDamage = 1;

    skills.multiShot = 0;
    skills.shield = 0;
    skills.shockwave = 0;

    enemies = [];
    bullets = [];
    expOrbs = [];
    healOrbs = [];

    score = 0;
    gameOver = false;
    levelUpChoosing = false;
    skillChoosing = false;

    enemySpawnTimer = 0;
    enemySpawnInterval = 90;

    shootTimer = 0;
    shootInterval = 70;

    healOrbTimer = 0;
    shieldAngle = 0;
    shockwaveTimer = 0;
    shockwaveEffectTimer = 0;
}

gameLoop();
</script>
</body>
</html>
